<style>
  .subsystem-shell {
    max-width: 1200px;
    margin: 2em auto;
    padding: 0 1em;
  }

  .subsystem-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin: 1.25rem 0 1.5rem;
    padding: 0.35rem;
    border: 1px solid var(--global-border-color, #d8dee4);
    border-radius: 4px;
    background: var(--global-code-background-color, #fafafa);
  }

  .subsystem-nav__item {
    display: inline-flex;
    align-items: center;
    min-height: 2.25rem;
    padding: 0.45rem 0.8rem;
    color: var(--global-text-color, #494e52);
    font-weight: 700;
    text-decoration: none;
    border: 1px solid transparent;
    border-radius: 4px;
  }

  .subsystem-nav__item:hover {
    text-decoration: none;
    border-color: var(--global-border-color, #d8dee4);
    background: var(--global-bg-color, #fff);
  }

  .subsystem-nav__item.is-active {

  }

  .personal-system-card:hover {
    text-decoration: none;
    border-color: var(--global-link-color, #52adc8);
  }

  .personal-system-card strong {
    display: block;
    margin-bottom: 8px;
    color: var(--global-text-color, #2c3e50);
    font-size: 1.05em;
  }

  .personal-system-card span {

  }

  .subsystem-login {

  .subsystem-login h2 { margin-top: 0; }

    border: 1px solid var(--global-border-color, #d8dee4);

  }
  .subsystem-login button { width: 100%; margin-top: 0.75rem; }

</style>

<section id="subsystem-login" class="subsystem-login" hidden>
  <h2>请输入密码</h2>
  <input id="subsystem-password" type="password" placeholder="请输入密码" autocomplete="current-password">
  <button id="subsystem-login-submit" class="btn btn--primary" type="button">确认</button>
  <p id="subsystem-login-error" class="subsystem-login__error" role="alert"></p>
</section>

<div id="subsystem-dashboard">

<div class="personal-system-actions subsystem-dashboard">
  <a class="btn btn--primary" href="{{ site.baseurl }}/subsystem/accounting/">进入个人系统</a>
</div>

<div class="personal-system-grid subsystem-dashboard">
  <a class="personal-system-card" href="{{ site.baseurl }}/subsystem/accounting/">
    <strong>记账</strong>
    <span>记录资产构成、消费统计和历史对比。</span>
  </a>
  <a class="personal-system-card" href="{{ site.baseurl }}/subsystem/diary/">
    <strong>日记</strong>
    <span>写日记、待办和知识记录。</span>
  </a>
  <a class="personal-system-card" href="{{ site.baseurl }}/subsystem/video/">
    <strong>视频</strong>
    <span>播放子系统视频列表中的本地视频。</span>
  </a>
  <a class="personal-system-card" href="{{ site.baseurl }}/subsystem/weight/">
    <strong>体重记录</strong>
    <span>保存体重、目标体重并查看趋势图。</span>
  </a>
</div>

<script>
(() => {
  const DATABASE_URL = 'https://moneybase-bf6ec-default-rtdb.asia-southeast1.firebasedatabase.app';
  const PASSWORD_PATH = 'config/loginPassword';
  const TIMEOUT_MS = 8000;
  const loginPanel = document.getElementById('subsystem-login');
  const dashboardItems = document.querySelectorAll('.subsystem-dashboard');
  const passwordInput = document.getElementById('subsystem-password');
  const submitButton = document.getElementById('subsystem-login-submit');
  const errorMessage = document.getElementById('subsystem-login-error');

  function getNextUrl() {
    const next = new URLSearchParams(window.location.search).get('next');
    if (!next || next.startsWith('http') || next.startsWith('/') || next.includes('..')) return null;
    return next;
  }

  function setDashboardVisible(visible) {
    loginPanel.hidden = visible;
    loginPanel.setAttribute('aria-hidden', String(visible));
    loginPanel.style.display = visible ? 'none' : '';
    dashboardItems.forEach((item) => { item.hidden = !visible; });
    passwordInput.disabled = visible;
    if (!visible) passwordInput.focus();
  }

  async function getCloudPassword() {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
    try {
      const response = await fetch(`${DATABASE_URL}/${PASSWORD_PATH}.json`, { signal: controller.signal });
      if (!response.ok) return null;
      const password = await response.json();
      return password === null ? null : String(password).trim();
    } catch (error) {
      console.error('获取云端密码失败:', error);
      return null;
    } finally {
      clearTimeout(timeoutId);
    }
  }

  async function verifyPassword() {
    const inputPassword = passwordInput.value.trim();
    if (!inputPassword) {
      errorMessage.textContent = '请输入密码';
      return;
    }
    submitButton.disabled = true;
    errorMessage.textContent = '验证中...';
    const cloudPassword = await getCloudPassword();
    if (cloudPassword === null) {
      errorMessage.textContent = '无法获取云端密码，请检查网络或 Firebase 配置';
      submitButton.disabled = false;
      return;
    }
    if (inputPassword !== cloudPassword) {
      errorMessage.textContent = '密码错误，请重新输入';
      passwordInput.value = '';
      passwordInput.focus();
      submitButton.disabled = false;
      return;
    }
    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('loginTime', Date.now().toString());
    passwordInput.value = '';
    passwordInput.blur();
    errorMessage.textContent = '';
    setDashboardVisible(true);
    const next = getNextUrl();
    window.location.href = next ? `/subsystem/${next}` : '/subsystem/';
  }

  submitButton.addEventListener('click', verifyPassword);
  passwordInput.addEventListener('keypress', (event) => {
    if (event.key === 'Enter') verifyPassword();
  });
  const loginTime = Number(localStorage.getItem('loginTime'));
  const loginValid = localStorage.getItem('isLoggedIn') === 'true'
    && Number.isFinite(loginTime)
    && Date.now() - loginTime <= 180000;
  if (!loginValid) {
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('loginTime');
  }
  setDashboardVisible(loginValid);
})();
</script>
