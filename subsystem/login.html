    <div class="password-container">

    <!-- 使用 Firebase Realtime Database REST 接口，避免依赖远程 ES module -->
    <script>
        (() => {
        const PASSWORD_PATH = 'config/loginPassword';
        const DATABASE_URL = 'https://moneybase-bf6ec-default-rtdb.asia-southeast1.firebasedatabase.app';
        const DEFAULT_NEXT = 'diary/index.html';
        const FIREBASE_TIMEOUT_MS = 8000;

        function getNextUrl() {
            const params = new URLSearchParams(window.location.search);
            const next = params.get('next');
            if (!next || next.startsWith('http') || next.startsWith('/') || next.includes('..')) {
                return DEFAULT_NEXT;
            }
            return next;
        }
        
        async function getCloudPassword() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), FIREBASE_TIMEOUT_MS);

            try {
                const response = await fetch(`${DATABASE_URL}/${PASSWORD_PATH}.json`, {
                    signal: controller.signal
                });
                if (!response.ok) return null;

                const password = await response.json();
                return password === null ? null : String(password).trim();
            } catch (e) {
                console.error('获取云端密码失败:', e);
                return null;
            } finally {
                clearTimeout(timeoutId);
            }
        }
        
        // 加载封面图片
        function loadCoverImage() {
            const coverImage = document.getElementById('cover-image');
            const fallback = document.getElementById('cover-image-fallback');
            const localFallbackImage = new URL('../images/homepage.png', window.location.href).href;
            const currentDate = new Date();
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1; // 月份是 1-12
            const day = currentDate.getDate();
            const dateStr = `${year}${month.toString().padStart(2, '0')}${day.toString().padStart(2, '0')}`;
            
            // 随机从 1-10 中选取 font
            const font = Math.floor(Math.random() * 10) + 1;
            
            // 使用万年历 API 获取图片
            const apiKey = 'ER3492DjqHxvWSN9VKxJf13NMR';
            const imageUrl = `https://api.shwgij.com/api/today/today?key=${apiKey}&data=${dateStr}&font=${font}&bg=`;
            
            coverImage.onerror = function() {
                if (coverImage.src !== localFallbackImage) {
                    coverImage.src = localFallbackImage;
                    return;
                }
                coverImage.style.display = 'none';
                fallback.style.display = 'block';
            };
            coverImage.onload = function() {
                fallback.style.display = 'none';
                coverImage.style.display = 'inline-block';
            };
            coverImage.src = imageUrl;
        }
        
        // 表单元素位于脚本之前，立即初始化，不等待远程模块完成加载。
        function initializeLogin() {
            // 检查是否已经登录
            if (localStorage.getItem('isLoggedIn') === 'true') {
                // 已登录，跳转到目标页面
                window.location.href = getNextUrl();
                return;
            }
            
            // 加载封面图片
            loadCoverImage();
            
            // 绑定密码提交事件
            document.getElementById('password-submit').addEventListener('click', verifyPassword);
            
            // 绑定回车键事件
            document.getElementById('password-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    verifyPassword();
                }
            });
        }
        
        // 验证密码（从云端获取密码后对比）
        async function verifyPassword() {
            const inputPassword = document.getElementById('password-input').value.trim();
            const passwordError = document.getElementById('password-error');
            const submitBtn = document.getElementById('password-submit');
            
            if (!inputPassword) {
                passwordError.textContent = '请输入密码';
                return;
            }
            
            submitBtn.disabled = true;
            passwordError.textContent = '验证中...';
            
            const cloudPassword = await getCloudPassword();
            
            if (cloudPassword === null) {
                passwordError.textContent = '无法获取云端密码，请检查网络或 Firebase 配置';
                submitBtn.disabled = false;
                return;
            }
            
            if (inputPassword === cloudPassword) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loginTime', Date.now().toString());
                window.location.href = getNextUrl();
            } else {
                passwordError.textContent = '密码错误，请重新输入';
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
                submitBtn.disabled = false;
            }
        }

        initializeLogin();
        })();
    </script>
