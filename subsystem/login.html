<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <script>
    const next = new URLSearchParams(window.location.search).get('next');
    const target = next && !next.startsWith('http') && !next.startsWith('/') && !next.includes('..')
      ? `/subsystem/?next=${encodeURIComponent(next)}`
      : '/subsystem/';
    window.location.replace(target);
  </script>
</head>
<body>
  <p>正在跳转到个人系统登录入口...</p>
</body>
</html>
