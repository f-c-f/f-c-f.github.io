<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人日记</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics.js";
        
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyArPIxpg9nmA3hm76ibm1QjRPQX1shkYIg",
            authDomain: "moneybase-bf6ec.firebaseapp.com",
            databaseURL: "https://moneybase-bf6ec-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "moneybase-bf6ec",
            storageBucket: "moneybase-bf6ec.firebasestorage.app",
            messagingSenderId: "821348432254",
            appId: "1:821348432254:web:7d5b062906f63011135b2f",
            measurementId: "G-Y7WJ8DTGXV"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const database = getDatabase(app);
        
        // Make Firebase available globally
        window.firebase = { app, database, ref, set, get, onValue };
    </script>

</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-container">
                <a href="../index.html" class="nav-btn">记账</a>
                <a href="index.html" class="nav-btn active">日记</a>
                <button id="logout-btn" class="nav-btn logout">退出登录</button>
            </div>
        </nav>
        
        <h1>个人日记</h1>
        
        <!-- 日记输入区域 -->
        <div class="diary-input">
            <h2>写日记</h2>
            <div class="form-group">
                <label for="diary-title">标题：</label>
                <input type="text" id="diary-title" placeholder="请输入日记标题">
            </div>
            <div class="form-group">
                <label for="diary-content">内容：</label>
                <textarea id="diary-content" placeholder="请输入日记内容" rows="10"></textarea>
            </div>
            <div class="form-group">
                <label for="diary-date">日期：</label>
                <input type="date" id="diary-date">
            </div>
            <button id="save-diary">保存日记</button>
        </div>
        
        <!-- 日记列表区域 -->
        <div class="diary-list">
            <h2>日记列表</h2>
            <div id="diary-entries">
                <!-- 日记条目将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 编辑日记模态框 -->
        <div id="edit-modal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h3>编辑日记</h3>
                <div class="form-group">
                    <label for="edit-title">标题：</label>
                    <input type="text" id="edit-title">
                </div>
                <div class="form-group">
                    <label for="edit-content">内容：</label>
                    <textarea id="edit-content" rows="10"></textarea>
                </div>
                <div class="form-group">
                    <label for="edit-date">日期：</label>
                    <input type="date" id="edit-date">
                </div>
                <button id="update-diary">更新日记</button>
                <button id="cancel-edit">取消</button>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
